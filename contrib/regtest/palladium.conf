# Palladium Core — regtest configuration
# Used by contrib/regtest.sh for local Lightning Network testing.
#
# This file is placed at $PALLADIUM_DIR/palladium.conf by regtest.sh.
# Authentication uses cookie auth (.cookie file) — no rpcuser/rpcpassword needed.

# Always run in regtest when using this datadir
regtest=1

[regtest]
# Required by lightningd's bcli plugin (getrawtransaction on confirmed txs)
txindex=1

# Enable JSON-RPC server
server=1

# No external P2P connections needed for local testing
listen=0

# Minimum fee for transactions (low for easy testing)
fallbackfee=0.00000253
minrelaytxfee=0.00000001

# ZMQ notifications (used by lightningd for faster block/tx detection)
zmqpubrawblock=tcp://127.0.0.1:28332
zmqpubrawtx=tcp://127.0.0.1:28333
